<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey Mihai | Digital Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');

        :root {
            --p: #a18cd1;
            --a: #ff9a9e;
            --cyan: #8cf1ff;
            --bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PANTALLA DE ENTRADA CON BORDES REDONDEADOS EN EL TEXTO */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1s ease-in-out;
        }

        #splash h1 {
            font-family: 'Permanent Marker', cursive; font-size: 3.5rem;
            background: linear-gradient(90deg, #fff, var(--p), var(--a));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite alternate;
        }

        /* FONDO DE LUCES Y NEBULOSA */
        .neon-glow {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(circle at 20% 30%, rgba(161, 140, 209, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 154, 158, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(140, 241, 255, 0.1) 0%, transparent 60%);
            animation: glowMove 15s infinite alternate;
        }

        @keyframes glowMove {
            0% { filter: hue-rotate(0deg) scale(1); }
            100% { filter: hue-rotate(90deg) scale(1.2); }
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* TARJETA ULTRA TRANSPARENTE Y SÚPER REDONDEADA */
        #content {
            opacity: 0; transform: translateY(50px);
            transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 90%; max-width: 460px;
        }

        .card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* BORDES MUCHO MÁS REDONDEADOS */
            border-radius: 70px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.05);
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .name {
            font-family: 'Permanent Marker', cursive; font-size: 3.2rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            margin-bottom: 20px;
        }

        /* REPRODUCTOR MULTI-TRACK REDONDEADO */
        .player {
            background: rgba(0,0,0,0.5);
            /* BORDES MUCHO MÁS REDONDEADOS */
            border-radius: 40px;
            padding: 30px;
            margin: 30px 0; border: 1px solid rgba(255,255,255,0.08);
        }

        .track-info { font-size: 0.6rem; letter-spacing: 2px; color: var(--p); margin-bottom: 20px; text-transform: uppercase; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; }

        .nav-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.2rem; opacity: 0.5; transition: 0.3s; }
        .nav-btn:hover { opacity: 1; transform: scale(1.2); }

        .play-btn {
            width: 70px; height: 70px;
            /* BOTÓN PERFECTAMENTE REDONDO */
            border-radius: 50%;
            background: #fff; border: none; cursor: pointer;
            font-size: 1.4rem; transition: 0.3s; box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--p); }

        /* BARRAS DE MÚSICA CON PUNTAS REDONDEADAS */
        .bars { display: flex; justify-content: center; gap: 5px; height: 25px; margin-top: 20px; }
        .bar { width: 4px; height: 100%; background: var(--cyan); /* PUNTAS REDONDEADAS */ border-radius: 10px; opacity: 0.2; transition: 0.3s; }
        .active .bar { animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 5px; opacity: 0.3; } to { height: 25px; opacity: 1; } }

        /* INFO BOXES SÚPER REDONDEADOS */
        .box {
            background: rgba(255,255,255,0.02);
            padding: 25px;
            /* BORDES MUCHO MÁS REDONDEADOS */
            border-radius: 35px;
            margin-bottom: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .box:hover { background: rgba(255,255,255,0.05); border-color: var(--p); transform: translateX(5px); }
        .box h4 { color: var(--p); font-size: 0.95rem; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .box p { font-size: 0.85rem; color: rgba(255,255,255,0.6); line-height: 1.6; }

        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            /* BORDES MUCHO MÁS REDONDEADOS */
            border-radius: 30px;
            text-decoration: none; color: #fff; font-size: 0.85rem; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

        footer { margin-top: 50px; font-size: 0.65rem; color: rgba(255,255,255,0.2); letter-spacing: 3px; }

        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash" onclick="entry()">
        <h1>ANDREY</h1>
        <p style="letter-spacing: 5px; font-size: 0.7rem; color: #888;">TAP TO EXPLORE</p>
    </div>

    <div class="neon-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div style="margin-bottom: 25px;">
                <img src="https://count.getloli.com/get/@andrey828?theme=rule73" alt="Views" style="height: 22px; filter: invert(1) brightness(2) hue-rotate(180deg);">
            </div>

            <div class="player">
                <div class="track-info" id="track-name">Track 01 - Loading...</div>
                <div class="controls">
                    <button class="nav-btn" onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
                    <button class="play-btn" id="pBtn"><i class="fa-solid fa-play" id="icon"></i></button>
                    <button class="nav-btn" onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
                </div>
                <div id="visuals" class="bars">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                </div>
            </div>

            <div class="box">
                <h4><i class="fa-solid fa-microchip"></i> xA Addon</h4>
                <p>Expert en optimització i sistemes digitals.</p>
            </div>

            <div class="links">
                <a href="https://github.com/andrey828" target="_blank" class="btn">GITHUB</a>
                <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="btn">DISCORD</a>
            </div>

            <footer>© 2026 DIGITAL EXPERIENCE</footer>
        </div>
    </div>

    <script>
        // LISTA DE CANCIONES
        const tracks = [
            { name: "Lofi Study - Chill", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "Night Drive - Synth", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "Deep Focus - Ambient", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];

        let currentTrack = 0;
        const audio = new Audio(tracks[currentTrack].url);
        const trackTitle = document.getElementById('track-name');
        const pBtn = document.getElementById('pBtn');
        const icon = document.getElementById('icon');
        const visuals = document.getElementById('visuals');

        function loadTrack(index) {
            currentTrack = index;
            audio.src = tracks[currentTrack].url;
            trackTitle.innerText = tracks[currentTrack].name;
            if (!audio.paused) audio.play();
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % tracks.length;
            loadTrack(currentTrack);
            audio.play();
            updateUI(true);
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrack);
            audio.play();
            updateUI(true);
        }

        function updateUI(playing) {
            if(playing) {
                icon.classList.replace('fa-play', 'fa-pause');
                visuals.classList.add('active');
            } else {
                icon.classList.replace('fa-pause', 'fa-play');
                visuals.classList.remove('active');
            }
        }

        function entry() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                document.getElementById('content').style.transform = 'translateY(0)';
                loadTrack(0);
                audio.play().then(() => updateUI(true)).catch(() => {});
            }, 800);
        }

        pBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                updateUI(true);
            } else {
                audio.pause();
                updateUI(false);
            }
        };

        // CANVAS PARTICULAS FLOTANTES
        const cvs = document.getElementById('bg-canvas');
        const ctx = cvs.getContext('2d');
        let pts = [];

        function resize() {
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        }

        function create() {
            pts = [];
            for(let i=0; i<50; i++) {
                pts.push({ 
                    x: Math.random()*cvs.width, 
                    y: Math.random()*cvs.height, 
                    v: Math.random()*0.2 + 0.1,
                    s: Math.random()*2
                });
            }
        }

        function anim() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            pts.forEach(p => {
                p.y -= p.v;
                if(p.y < 0) p.y = cvs.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(anim);
        }

        window.onresize = resize;
        resize(); create(); anim();
        trackTitle.innerText = tracks[0].name;
    </script>
</body>
</html>
