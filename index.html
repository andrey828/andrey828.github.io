<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey Mihai | Personal Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020202;
            color: #fff;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* FONDO DINÁMICO */
        .aurora {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, #1a0525 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, #051a25 0%, transparent 40%);
            filter: blur(80px);
            animation: auroraMove 20s infinite alternate;
        }

        @keyframes auroraMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        #nebula-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* TARJETA GUNS STYLE */
        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 35px;
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 480px;
            padding: 50px 35px;
            animation: fadeIn 1.2s ease-out;
            position: relative;
            transform-style: preserve-3d;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .header-section { text-align: center; margin-bottom: 30px; }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.2rem;
            background: linear-gradient(135deg, #fff 0%, #a18cd1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(161, 140, 209, 0.4));
        }

        /* CONTADOR DE VISTAS LIMPIO (LED NEÓN) */
        .visitor-counter {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .visitor-counter span {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* REPRODUCTOR MEJORADO */
        .music-player {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .play-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .section-title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            margin: 25px 0 12px 0;
            text-transform: uppercase;
        }

        .info-box {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .info-box:hover { background: rgba(255,255,255,0.04); transform: translateY(-3px); }

        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .social-link {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .social-link:hover { background: #fff; color: #000; }

        .tag {
            background: rgba(255,255,255,0.05);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-right: 5px;
        }

        footer { margin-top: 40px; font-size: 0.7rem; color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="aurora"></div>
    <canvas id="nebula-canvas"></canvas>

    <div class="glass-card" id="card">
        <div class="header-section">
            <h1>Andrey Mihai</h1>
            
            <div class="visitor-counter">
                <span>Total Views</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=rule73" alt="Views" style="height: 25px; filter: invert(1) brightness(2);">
            </div>
        </div>

        <div class="music-player">
            <button class="play-btn" id="musicBtn">Listen Vibe</button>
            <audio id="bgMusic" loop>
                <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequency/Ketsa_-_04_-_Day_Trip.mp3" type="audio/mpeg">
            </audio>
        </div>

        <p class="section-title">Project</p>
        <div class="info-box">
            <h3 style="color: #a18cd1; font-size: 1rem; margin-bottom: 5px;">xA Addon</h3>
            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">Optimización y soporte constante.</p>
        </div>

        <p class="section-title">About</p>
        <div class="info-box">
            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">Explorador digital. Enfocado en minimalismo y eficiencia técnica.</p>
        </div>

        <div class="social-container">
            <a href="https://github.com/andrey828" target="_blank" class="social-link">GitHub</a>
            <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="social-link">Discord</a>
        </div>

        <p class="section-title">Stack</p>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span class="tag">xA Addon</span>
            <span class="tag">Dev</span>
            <span class="tag">Minimal</span>
        </div>
    </div>

    <footer>&copy; 2026 Andrey Mihai</footer>

    <script>
        // MÚSICA REPARADA
        const btn = document.getElementById('musicBtn');
        const music = document.getElementById('bgMusic');
        music.volume = 0.4;

        btn.onclick = () => {
            if (music.paused) {
                music.play().catch(e => console.log("Error de audio"));
                btn.innerText = "Mute";
            } else {
                music.pause();
                btn.innerText = "Listen Vibe";
            }
        };

        // CANVAS NÉBULA
        const canvas = document.getElementById('nebula-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = Array.from({length: 80}, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
                size: Math.random() * 1.5,
                alpha: Math.random()
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha * 0.2})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        // PARALLAX SUTIL
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 40;
            let y = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.onresize = init;
        init(); draw();
    </script>
</body>
</html>
