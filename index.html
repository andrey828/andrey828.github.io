<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey Mihai | Relax Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;600;800&family=JetBrains+Mono:wght@200&display=swap');

        /* --- CONFIGURACIÓN DE COLORES --- */
        :root {
            /* MODO OSCURO (Predeterminado) */
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.02);
            --text: #ffffff;
            --subtext: rgba(255, 255, 255, 0.5);
            --accent: #a18cd1; /* Púrpura suave */
            --border: rgba(255, 255, 255, 0.08);
            --glass: blur(45px);
        }

        [data-theme="light"] {
            /* MODO CLARO */
            --bg: #f5f7fa;
            --card-bg: rgba(0, 0, 0, 0.03);
            --text: #1a1a1a;
            --subtext: rgba(0, 0, 0, 0.6);
            --accent: #6e5494; /* Púrpura más oscuro */
            --border: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.4s, color 0.4s, border 0.4s; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* BOTÓN DE CAMBIO DE TEMA */
        .theme-switch {
            position: fixed; top: 25px; right: 25px; z-index: 10000;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 12px; border-radius: 50%; cursor: pointer;
            backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            color: var(--text); font-size: 1.1rem;
            transition: 0.3s;
        }
        .theme-switch:hover { transform: scale(1.1); background: var(--text); color: var(--bg); }

        /* PANTALLA DE ENTRADA (SPLASH) */
        #splash {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1s ease-in-out;
        }

        #splash h1 {
            font-family: 'Permanent Marker', cursive; font-size: clamp(2.5rem, 10vw, 4rem);
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite alternate;
        }

        /* EFECTO DE LUZ DE FONDO */
        .glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, var(--accent), transparent 70%);
            opacity: 0.12; filter: blur(120px);
        }

        /* TARJETA PRINCIPAL (SÚPER REDONDEADA) */
        #content {
            opacity: 0; transform: translateY(30px) scale(0.95);
            transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 90%; max-width: 480px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 65px; /* SÚPER REDONDEADO */
            padding: 55px 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            position: relative;
        }

        .name { font-family: 'Permanent Marker', cursive; font-size: clamp(2.2rem, 8vw, 3.2rem); margin-bottom: 20px; }

        /* --- NUEVO CONTADOR DE VISTAS ESTILIZADO (LED DIGITAL) --- */
        .visitor-counter-v2 {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            padding: 8px 22px;
            border-radius: 100px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        .visitor-counter-v2 .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--subtext);
            font-weight: 800;
        }

        .visitor-counter-v2 .hit-api-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 200;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
            letter-spacing: -1px;
            line-height: 1;
        }

        /* Ajuste de color para modo claro */
        [data-theme="light"] .visitor-counter-v2 .hit-api-display {
            color: #000;
            text-shadow: 0 0 8px rgba(0,0,0,0.2);
        }

        /* REPRODUCTOR SÚPER REDONDEADO */
        .player {
            background: rgba(0,0,0,0.1); border-radius: 45px;
            padding: 25px; margin: 30px 0; border: 1px solid var(--border);
        }

        .track-info { font-size: 0.7rem; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 15px; font-weight: 800; text-transform: uppercase; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; }

        .play-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--text); color: var(--bg); border: none; cursor: pointer;
            font-size: 1.4rem; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .play-btn:hover { transform: scale(1.1); }

        .nav-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.15rem; opacity: 0.5; transition: 0.3s; }
        .nav-btn:hover { opacity: 1; transform: scale(1.1); }

        /* VISUALIZER REDONDEADO */
        .bars { display: flex; justify-content: center; gap: 5px; height: 22px; margin-top: 18px; }
        .bar { width: 4px; height: 100%; background: var(--accent); border-radius: 10px; opacity: 0.15; transition: 0.3s; }
        .active .bar { animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { height: 5px; opacity: 0.2; } to { height: 22px; opacity: 1; } }

        /* INFO BOXES SÚPER REDONDEADOS */
        .box {
            background: var(--card-bg); padding: 25px; border-radius: 35px;
            margin-bottom: 20px; text-align: left; border: 1px solid var(--border);
            transition: 0.3s ease;
        }
        .box:hover { background: rgba(255,255,255,0.01); transform: translateX(5px); border-color: var(--accent); }
        .box h4 { color: var(--accent); font-size: 0.95rem; margin-bottom: 6px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .box p { font-size: 0.85rem; color: var(--subtext); line-height: 1.6; }

        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn {
            background: var(--card-bg); padding: 20px; border-radius: 28px;
            text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 800;
            border: 1px solid var(--border); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;
        }
        .btn:hover { background: var(--text); color: var(--bg); transform: translateY(-3px); }

        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="theme-switch" onclick="toggleTheme()">
        <i class="fa-solid fa-circle-half-stroke"></i>
    </div>

    <div id="splash" onclick="entry()">
        <h1>ANDREY</h1>
        <p style="letter-spacing: 5px; font-size: 0.7rem; color: var(--subtext);">CLICK TO RELAX</p>
    </div>

    <div class="glow"></div>

    <div id="content">
        <div class="card" id="tilt-card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div class="visitor-counter-v2">
                <span class="label">Visitas</span>
                <div class="hit-api-display">
                    <img src="https://count.getloli.com/get/@andrey828?theme=rule73" alt="Hits" style="height: 25px; filter: invert(1) brightness(2) contrast(1.2);">
                </div>
            </div>

            <div class="player">
                <div class="track-info" id="track-name">Yellow - Coldplay (Instrumental)</div>
                <div class="controls">
                    <button class="nav-btn" onclick="prevTrack()"><i class="fa-solid fa-backward"></i></button>
                    <button class="play-btn" id="pBtn"><i class="fa-solid fa-play" id="icon"></i></button>
                    <button class="nav-btn" onclick="nextTrack()"><i class="fa-solid fa-forward"></i></button>
                </div>
                <div id="visuals" class="bars">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                </div>
            </div>

            <div class="box">
                <h4><i class="fa-solid fa-leaf"></i> xA Addon</h4>
                <p>Optimizando el mundo digital con calma y precisión técnica.</p>
            </div>

            <div class="links">
                <a href="https://github.com/andrey828" target="_blank" class="btn">GITHUB</a>
                <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="btn">DISCORD</a>
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { name: "Yellow - Coldplay (Instrumental)", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" },
            { name: "Rainy Night - Relax", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" },
            { name: "Deep Meditation", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" }
        ];

        let currentTrack = 0;
        const audio = new Audio(tracks[currentTrack].url);
        audio.volume = 0.5; // Volumen inicial al 50%
        const pBtn = document.getElementById('pBtn');
        const icon = document.getElementById('icon');
        const visuals = document.getElementById('visuals');
        const trackTitle = document.getElementById('track-name');

        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function entry() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                document.getElementById('content').style.transform = 'translateY(0) scale(1)';
                audio.play().then(() => updateUI(true)).catch(() => console.log("Audio play blocked"));
            }, 800);
        }

        function loadTrack(i) {
            currentTrack = i;
            audio.src = tracks[currentTrack].url;
            trackTitle.innerText = tracks[currentTrack].name;
            audio.play();
            updateUI(true);
        }

        function nextTrack() { currentTrack = (currentTrack + 1) % tracks.length; loadTrack(currentTrack); }
        function prevTrack() { currentTrack = (currentTrack - 1 + tracks.length) % tracks.length; loadTrack(currentTrack); }

        function updateUI(playing) {
            if(playing) {
                icon.classList.replace('fa-play', 'fa-pause');
                visuals.classList.add('active');
            } else {
                icon.classList.replace('fa-pause', 'fa-play');
                visuals.classList.remove('active');
            }
        }

        pBtn.onclick = () => {
            if (audio.paused) { audio.play(); updateUI(true); }
            else { audio.pause(); updateUI(false); }
        };

        // EFECTO PARALLAX SUTIL
        const card = document.getElementById('tilt-card');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 35; // Sensibilidad suave
            let y = (window.innerHeight / 2 - e.pageY) / 35;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
