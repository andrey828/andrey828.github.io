<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey | Premium Vibe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;800&display=swap');

        :root {
            --bg: #010101;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --accent: #f1c40f; 
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(50px);
            --shadow: rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --bg: #fff5f8;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text: #6b5b95;
            --accent: #ff9a9e;
            --border: rgba(255, 154, 158, 0.2);
            --glass: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* Efecto Aurora de fondo */
        .aurora {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(161, 140, 209, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(241, 196, 15, 0.15) 0%, transparent 40%);
            filter: blur(100px); animation: aurora-float 15s infinite alternate ease-in-out;
        }
        @keyframes aurora-float { 0% { transform: scale(1); } 100% { transform: scale(1.2) translate(2%, 2%); } }

        .theme-switch {
            position: fixed; top: 30px; right: 30px; z-index: 1000;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px);
        }

        #splash {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.8s;
        }
        #splash h1 { font-family: 'Permanent Marker'; font-size: 4rem; color: var(--accent); }

        #content { opacity: 0; transform: translateY(40px) scale(0.95); width: 90%; max-width: 440px; z-index: 10; transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1); }

        /* TARJETA CON TRANSPARENCIA */
        .card {
            background: var(--card-bg); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border); border-radius: 80px; padding: 60px 40px; 
            text-align: center; box-shadow: 0 40px 80px var(--shadow);
        }

        .name { font-family: 'Permanent Marker'; font-size: 3.5rem; margin-bottom: 25px; }

        /* CONTADOR SOLO NÚMEROS */
        .counter-vistas {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.3); padding: 10px 25px;
            border-radius: 100px; border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .counter-vistas span { font-size: 0.7rem; font-weight: 800; opacity: 0.5; letter-spacing: 2px; }
        .counter-vistas img { 
            height: 22px; 
            filter: grayscale(1) invert(1) brightness(2) contrast(1.2); 
            mix-blend-mode: plus-lighter;
        }

        .player {
            background: rgba(0,0,0,0.1); border-radius: 50px; padding: 35px;
            margin: 25px 0; border: 1px solid var(--border);
        }
        .play-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--text); color: var(--bg); border: none; cursor: pointer;
            font-size: 1.6rem; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--accent); }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--text); color: var(--bg); padding: 22px;
            border-radius: 40px; text-decoration: none; font-weight: 800; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="theme-switch" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></div>
    <div id="splash" onclick="entry()"><h1>ANDREY</h1><p style="opacity: 0.5; margin-top: 10px;">CLICK TO VIBE</p></div>
    <div class="aurora"></div>
    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            <div class="counter-vistas">
                <span>VISTAS</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=moebooru">
            </div>
            <div class="player">
                <p style="color: var(--accent); font-size: 0.8rem; margin-bottom: 20px; font-weight: 800;">COLDPLAY - YELLOW</p>
                <button class="play-btn" id="pBtn"><i class="fa-solid fa-play" id="icon"></i></button>
            </div>
            <a href="https://github.com/andrey828" target="_blank" class="btn">GITHUB PROFILE</a>
        </div>
    </div>
    <audio id="audio" loop src="https://files.catbox.moe/0v2z88.mp3"></audio>
    <script>
        const audio = document.getElementById('audio');
        function entry() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                document.getElementById('content').style.transform = 'translateY(0) scale(1)';
                audio.play(); document.getElementById('icon').className = 'fa-solid fa-pause';
            }, 700);
        }
        document.getElementById('pBtn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('icon').className = 'fa-solid fa-pause'; }
            else { audio.pause(); document.getElementById('icon').className = 'fa-solid fa-play'; }
        }
        function toggleTheme() {
            const h = document.documentElement;
            const isD = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isD ? 'light' : 'dark');
            document.querySelector('.theme-switch i').className = isD ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
    </script>
</body>
</html>
