<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey Mihai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');

        :root {
            --p: #f1c40f; /* Amarillo Coldplay */
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --blur: blur(50px);
        }

        [data-theme="light"] {
            --bg: #eef2f5;
            --card: rgba(255, 255, 255, 0.4);
            --text: #2d3436;
            --border: rgba(0, 0, 0, 0.05);
            --p: #ff7675;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s ease;
        }

        /* LUCES DINÁMICAS */
        .neon-glow {
            position: fixed; inset: -50%; z-index: -2;
            background: radial-gradient(circle at 30% 30%, rgba(241, 196, 15, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(161, 140, 209, 0.15) 0%, transparent 40%);
            animation: move 20s infinite linear;
        }
        @keyframes move { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* TEMA SWITCH */
        .theme-switch {
            position: fixed; top: 25px; right: 25px; z-index: 1000;
            background: var(--card); border: 1px solid var(--border);
            padding: 15px; border-radius: 50%; cursor: pointer; backdrop-filter: var(--blur);
        }

        /* SPLASH */
        #splash {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        #splash h1 { font-family: 'Permanent Marker'; font-size: 4rem; color: var(--p); }

        /* TARJETA */
        #content { opacity: 0; transform: translateY(30px) scale(0.95); width: 90%; max-width: 420px; z-index: 10; transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .card {
            background: var(--card); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border); border-radius: 70px; padding: 50px 30px; 
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.2);
        }

        .name { font-family: 'Permanent Marker'; font-size: 3.2rem; margin-bottom: 20px; }

        /* CONTADOR SOLO NÚMEROS */
        .vistas {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.1); padding: 8px 20px; border-radius: 100px;
            border: 1px solid var(--border); margin-bottom: 25px;
        }
        .vistas img { height: 18px; filter: grayscale(1) invert(1) brightness(2); mix-blend-mode: screen; }

        /* PLAYER */
        .player {
            background: rgba(0,0,0,0.05); border-radius: 40px; padding: 30px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .play-btn {
            width: 70px; height: 70px; border-radius: 50%; background: var(--text);
            color: var(--bg); border: none; cursor: pointer; font-size: 1.5rem; transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--p); }

        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            background: var(--text); color: var(--bg); padding: 18px; border-radius: 30px;
            text-decoration: none; font-weight: 800; font-size: 0.8rem; border: 1px solid var(--border); transition: 0.3s;
        }
        .discord { background: #5865F2; color: #fff; border: none; }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="theme-switch" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></div>

    <div id="splash" onclick="entry()">
        <h1>ANDREY</h1>
        <p style="opacity: 0.5; letter-spacing: 5px; margin-top: 15px;">TAP TO START</p>
    </div>

    <div class="neon-glow"></div>

    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div class="vistas">
                <span style="font-size: 0.6rem; opacity: 0.5; font-weight: 800;">VIEWS</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=moebooru">
            </div>

            <div class="player">
                <p style="color: var(--p); font-size: 0.7rem; font-weight: 800; margin-bottom: 15px; letter-spacing: 2px;">COLDPLAY - YELLOW</p>
                <button class="play-btn" onclick="togglePlay()"><i class="fa-solid fa-play" id="icon"></i></button>
            </div>

            <div class="links">
                <a href="https://github.com/andrey828" target="_blank" class="btn">GITHUB</a>
                <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="btn discord">DISCORD</a>
            </div>
        </div>
    </div>

    <audio id="musica" loop src="https://files.catbox.moe/0v2z88.mp3"></audio>

    <script>
        const m = document.getElementById('musica');
        const icon = document.getElementById('icon');

        function entry() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                document.getElementById('content').style.transform = 'translateY(0) scale(1)';
                m.play().then(() => icon.className = 'fa-solid fa-pause').catch(() => {});
            }, 600);
        }

        function togglePlay() {
            if (m.paused) { m.play(); icon.className = 'fa-solid fa-pause'; }
            else { m.pause(); icon.className = 'fa-solid fa-play'; }
        }

        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
