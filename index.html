<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrey Mihai | Personal Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050505;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* FONDO ANIMADO DE AURORA */
        .aurora {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, #2c0b3d 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #0b2c3d 0%, transparent 40%);
            filter: blur(60px);
            animation: auroraMove 20s infinite alternate;
        }

        @keyframes auroraMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        #nebula-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* TARJETA CON EFECTO CRISTAL LÍQUIDO */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            transform-style: preserve-3d;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(60px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header-section { text-align: center; margin-bottom: 30px; }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #ff9a9e 0%, #a18cd1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 20px rgba(161, 140, 209, 0.4));
        }

        /* ARREGLO DE CONTADOR DE VISTAS */
        .visitor-counter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #a18cd1;
            border: 1px solid rgba(161, 140, 209, 0.2);
        }

        /* REPRODUCTOR DE MÚSICA */
        .music-player {
            margin: 20px 0;
            text-align: center;
        }
        
        .play-btn {
            background: rgba(161, 140, 209, 0.2);
            border: 1px solid #a18cd1;
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .play-btn:hover { background: #a18cd1; transform: scale(1.05); }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.3);
            margin: 25px 0 15px 0;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .info-box:hover { background: rgba(255, 255, 255, 0.06); transform: scale(1.02); }

        .social-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .social-link:hover { background: #fff; color: #000; }

        .tag {
            background: rgba(161, 140, 209, 0.1);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: #a18cd1;
            margin-right: 5px;
        }

        footer { margin-top: 40px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div class="aurora"></div>
    <canvas id="nebula-canvas"></canvas>

    <div class="glass-card" id="card">
        <div class="header-section">
            <h1>Andrey Mihai</h1>
            
            <div class="visitor-counter">
                <span>VISTAS:</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=moebooru" alt="Vistas" style="height: 20px; filter: hue-rotate(280deg) brightness(1.5);">
            </div>
        </div>

        <div class="music-player">
            <button class="play-btn" id="musicBtn">♫ Play Lo-fi Vibe</button>
            <audio id="bgMusic" loop>
                <source src="https://www.bensound.com/bensound-music/bensound-lofi.mp3" type="audio/mpeg">
            </audio>
        </div>

        <p class="section-title">PROYECTO</p>
        <div class="info-box">
            <h3 style="color: #ff9a9e; font-size: 1rem; margin-bottom: 5px;">xA Addon</h3>
            <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">Mejora continua, optimización y estabilidad para xA Addon.</p>
        </div>

        <p class="section-title">COMUNIDAD</p>
        <div class="social-container">
            <a href="https://github.com/andrey828" target="_blank" class="social-link">GitHub</a>
            <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="social-link">Discord</a>
        </div>

        <p class="section-title">STACK</p>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span class="tag">Creación</span>
            <span class="tag">xA Addon</span>
            <span class="tag">Optimización</span>
        </div>
    </div>

    <footer>&copy; 2026 Andrey Mihai</footer>

    <script>
        // MÚSICA
        const btn = document.getElementById('musicBtn');
        const music = document.getElementById('bgMusic');
        btn.onclick = () => {
            if (music.paused) { music.play(); btn.innerText = "♫ Mute Vibe"; }
            else { music.pause(); btn.innerText = "♫ Play Lo-fi Vibe"; }
        };

        // CANVAS
        const canvas = document.getElementById('nebula-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = Array.from({length: 80}, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
                size: Math.random() * 1.5,
                alpha: Math.random()
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(161, 140, 209, ${p.alpha * 0.3})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        // PARALLAX 3D
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 40;
            let y = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.onresize = init;
        init(); draw();
    </script>
</body>
</html>
