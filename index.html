<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mihai Development</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div id="authOverlay" class="glass-overlay">
        <div class="auth-card" data-aos="zoom-in">
            <h2><i class="fas fa-lock"></i> SECURE ACCESS</h2>
            <input type="text" id="username" placeholder="Nombre de Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <div class="auth-buttons">
                <button onclick="login()" class="btn-primary">LOGIN</button>
                <button onclick="register()" class="btn-secondary">REGISTRAR</button>
            </div>
            <p id="authMsg"></p>
        </div>
    </div>

    <div id="mainApp" class="app-container blur">
        <header>
            <div class="logo">JAVA<span>VERSE</span>.OS</div>
            <div id="userInfo" class="user-tag"></div>
        </header>
        
        <div class="system-monitors">
            <div class="monitor-card glass">
                <label>ENCRYPTION STATUS</label>
                <div class="status-active">AES-256 BIT ENABLED</div>
            </div>
            <div class="monitor-card glass">
                <label>CPU CLUSTER</label>
                <div class="bar-bg"><div id="cpuBar" class="bar-fill"></div></div>
            </div>
        </div>

        <main class="ide-wrapper glass">
            <div class="ide-header"><span>KernelExecutor.java</span></div>
            <textarea id="editor">public class SecureModule { ... }</textarea>
            <div id="console" class="terminal-output">> Sistema Cifrado Listo.</div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
