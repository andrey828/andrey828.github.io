<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mihai</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <header data-aos="fade-down">
            <div class="logo">STACK<span>POLÍGLOTA</span></div>
            <div class="badges">
                <span class="badge java">Java 21</span>
                <span class="badge cpp">C++</span>
                <span class="badge cs">C#</span>
                <span class="badge py">Python</span>
            </div>
        </header>

        <div class="metrics" data-aos="fade-up">
            <div class="card">CPU: <span id="cpuVal">0%</span><div class="bar"><div id="cpuBar"></div></div></div>
            <div class="card">THREADS: <span id="threadCount">IDLE</span></div>
            <div class="card">SYSTEM: <span id="status">READY</span></div>
        </div>

        <div class="ide" data-aos="zoom-in">
            <div class="tabs"><span>Main.java</span><button id="runBtn"><i class="fas fa-play"></i> EXECUTE</button></div>
            <textarea id="editor">
public class PolyglotSystem {
    public static void main(String[] args) {
        // Ejecución en múltiples núcleos (Java, C++, C#, Python)
        System.out.println("Iniciando orquestación políglota...");
    }
}</textarea>
            <div id="console" class="console">> Terminal lista para comandos...</div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
