<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrey Mihai | Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fdfcfb;
            overflow-x: hidden;
            color: #2d3436;
            padding: 20px;
        }

        /* LUCES FLOTANTES DE FONDO */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(226, 209, 195, 0.4);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-50%, -50%); }
            100% { transform: translate(50%, 50%); }
        }

        /* ANIMACIÓN DE ENTRADA (FADE IN UP) */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 35px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            padding: 45px;
            animation: fadeInUp 1s ease-out; /* Animación de carga */
        }

        .header-section { text-align: center; margin-bottom: 30px; }

        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -1.5px;
            background: linear-gradient(90deg, #2d3436, #d63031);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            background: #fff;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        
        .tag:hover { transform: scale(1.1); background: #2d3436; color: #fff; }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b2bec3;
            margin: 30px 0 15px 0;
            font-weight: 600;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .info-box:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .social-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 18px;
            text-decoration: none;
            color: #2d3436;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }

        .social-link:hover {
            background: #2d3436;
            color: #fff;
            transform: translateY(-5px);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #b2bec3;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards; /* Aparece con retraso */
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: 20%; left: 20%; background: rgba(254, 214, 227, 0.5);"></div>
    <div class="bg-glow" style="bottom: 20%; right: 20%; background: rgba(168, 237, 234, 0.5);"></div>

    <div class="glass-card">
        <div class="header-section">
            <h1>Andrey Mihai</h1>
            <span class="tag">Digital Creator</span>
        </div>

        <p class="section-title">En qué estoy</p>
        <div class="info-box">
            <h3 style="color: #d63031; margin-bottom: 8px;">xA Addon</h3>
            <p style="font-size: 0.95rem; color: #636e72;">Optimización y desarrollo de módulos personalizados. Enfocado en la eficiencia extrema del código.</p>
        </div>

        <p class="section-title">Contacto</p>
        <div class="social-container">
            <a href="https://github.com/andrey828" target="_blank" class="social-link">GitHub</a>
            <div class="social-link">DC: xandrey___</div>
        </div>

        <p class="section-title">Stack</p>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span class="tag">Development</span>
            <span class="tag">xA Addon</span>
            <span class="tag">Optimization</span>
        </div>
    </div>

    <footer>
        &copy; 2026 Andrey Mihai
    </footer>

</body>
</html>
