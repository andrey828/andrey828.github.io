<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrey Mihai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;800&display=swap');

        :root {
            --bg: #050505; --card: rgba(255,255,255,0.03); --text: #fff;
            --accent: #f1c40f; --border: rgba(255,255,255,0.1); --blur: blur(40px);
        }

        [data-theme="light"] {
            --bg: #fff5f7; --card: rgba(255,255,255,0.7); --text: #5d507a;
            --accent: #ff9a9e; --border: rgba(255,154,158,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.4s ease; }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .theme-switch {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: var(--card); border: 1px solid var(--border);
            padding: 12px; border-radius: 50%; cursor: pointer; backdrop-filter: var(--blur);
        }

        #splash {
            position: fixed; inset: 0; background: var(--bg); z-index: 99;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }

        #splash h1 { font-family: 'Permanent Marker'; font-size: 4rem; color: var(--accent); }

        #content { opacity: 0; transform: scale(0.9); width: 90%; max-width: 400px; text-align: center; }

        .card {
            background: var(--card); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border); border-radius: 60px; padding: 50px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .name { font-family: 'Permanent Marker'; font-size: 3rem; margin-bottom: 20px; }

        .counter {
            background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 100px;
            display: inline-flex; align-items: center; gap: 10px; margin-bottom: 30px; border: 1px solid var(--border);
        }
        .counter img { height: 20px; filter: invert(1) brightness(2); }

        .player {
            background: rgba(0,0,0,0.1); border-radius: 40px; padding: 25px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }

        .play-btn {
            width: 70px; height: 70px; border-radius: 50%; background: var(--text);
            color: var(--bg); border: none; cursor: pointer; font-size: 1.5rem;
        }

        .box { background: var(--card); padding: 20px; border-radius: 30px; text-align: left; border: 1px solid var(--border); margin-bottom: 20px;}
        
        .btn {
            display: block; background: var(--text); color: var(--bg); padding: 18px;
            border-radius: 30px; text-decoration: none; font-weight: 800; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="theme-switch" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></div>

    <div id="splash" onclick="start()">
        <h1>ANDREY</h1>
        <p style="opacity: 0.5; margin-top: 10px; letter-spacing: 3px;">TAP TO START</p>
    </div>

    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div class="counter">
                <span style="font-size: 0.6rem; font-weight: 800; opacity: 0.5;">VISTAS</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=rule73">
            </div>

            <div class="player">
                <p style="font-size: 0.7rem; font-weight: 800; color: var(--accent); margin-bottom: 15px;">COLDPLAY - YELLOW</p>
                <button class="play-btn" onclick="togglePlay()"><i class="fa-solid fa-play" id="icon"></i></button>
            </div>

            <div class="box">
                <h4 style="color: var(--accent);">xA Addon</h4>
                <p style="font-size: 0.8rem; opacity: 0.7;">Optimización y desarrollo con estilo premium.</p>
            </div>

            <a href="https://github.com/andrey828" class="btn">GITHUB</a>
        </div>
    </div>

    <script>
        const audio = new Audio("https://files.catbox.moe/0v2z88.mp3");
        audio.loop = true;

        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function start() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                const c = document.getElementById('content');
                c.style.opacity = '1'; c.style.transform = 'scale(1)';
                audio.play();
                document.getElementById('icon').className = 'fa-solid fa-pause';
            }, 500);
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('icon').className = 'fa-solid fa-pause'; }
            else { audio.pause(); document.getElementById('icon').className = 'fa-solid fa-play'; }
        }
    </script>
</body>
</html>
