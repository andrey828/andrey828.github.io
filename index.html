<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xA Addon — Combat Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>
<div class="noise"></div>
<div class="grid-bg"></div>
<div class="vignette"></div>
<div class="scanline"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<canvas id="bgc"></canvas>
<div id="toast"></div>

<nav>
  <div class="nav-logo">
    <span class="x">x</span><span class="a">A</span><span class="dot"></span>
  </div>
  <div class="nav-links">
    <a class="nb active" href="#hero">Inicio</a>
    <a class="nb" href="#modulos">Módulos</a>
    <a class="nb" href="#download-section">Descargar</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="nav-status"><div class="status-dot"></div>EN LÍNEA</div>
    <button class="nav-dl">DESCARGAR</button>
  </div>
</nav>

<div class="page">
    <section id="hero">
        <div class="hero-badge"><span class="badge-ping"></span>MeteorClient Addon · v2.0</div>
        <div class="hero-main">
            <div class="glitch-wrap"><span class="hero-xa">xA</span></div>
            <span class="hero-addon">Addon</span>
        </div>
        <p class="hero-sub">La suite de combate más avanzada. <strong>Teleport exploit. Totem preciso. Kill instantáneo.</strong></p>
        <div class="hero-btns">
            <button class="btn-p">DESCARGAR AHORA</button>
            <a class="btn-s" href="#modulos">VER MÓDULOS</a>
        </div>
        <div class="hero-stats">
            <div class="stats-wrap">
                <div class="stat"><div class="stat-n" data-target="12">0</div><div class="stat-l">Módulos</div></div>
                <div class="stat"><div class="stat-n" data-target="100" data-suffix="%">0</div><div class="stat-l">Bypass</div></div>
            </div>
        </div>
    </section>

    <section class="sec" id="modulos">
        <div class="sec-eye">arsenal</div>
        <h2 class="sec-title">COMBAT<br>MODULES</h2>
        <div class="mod-grid" id="mod-grid">
            </div>
    </section>

    <footer id="download-section">
        <button class="dl-btn" onclick="showToast()">
            <span class="dl-icon">↓</span>
            <span>Descargar xA_Suite.jar</span>
        </button>
        <div class="dl-meta">v2.0.4 | Build: 2026.03.18 | <span class="dl-badge">Verified</span></div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
