<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey | Premium Vibe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #020202;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --accent: #f1c40f; 
            --accent-2: #a18cd1;
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(50px);
            --shadow: rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --bg: #fff5f8;
            --card-bg: rgba(255, 255, 255, 0.65);
            --text: #5d507a;
            --accent: #ff9a9e;
            --border: rgba(255, 154, 158, 0.3);
            --glass: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- LUCES DINÁMICAS DE FONDO --- */
        .nebula {
            position: fixed; inset: -50%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, var(--accent) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, var(--accent-2) 0%, transparent 40%);
            opacity: 0.15; filter: blur(120px);
            animation: nebula-move 20s infinite alternate linear;
        }

        @keyframes nebula-move {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1.2); }
        }

        /* Estrellas flotantes */
        .stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.4; }

        .theme-switch {
            position: fixed; top: 30px; right: 30px; z-index: 1000;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 18px; border-radius: 50%; cursor: pointer;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px var(--shadow);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #splash {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #splash h1 { font-family: 'Permanent Marker'; font-size: 4rem; color: var(--accent); filter: drop-shadow(0 0 20px var(--accent)); }

        /* --- TARJETA CRISTAL PREMIUM --- */
        #content { opacity: 0; transform: translateY(40px) scale(0.9); width: 90%; max-width: 440px; z-index: 10; transition: 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }

        .card {
            background: var(--card-bg); 
            backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border); 
            border-radius: 80px; padding: 60px 40px; text-align: center;
            box-shadow: 0 40px 100px var(--shadow);
            animation: card-float 6s infinite ease-in-out;
        }

        @keyframes card-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .name { font-family: 'Permanent Marker'; font-size: 3.5rem; margin-bottom: 25px; }

        /* --- CONTADOR NÚMEROS --- */
        .vistas-box {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.4); padding: 10px 25px;
            border-radius: 100px; border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .vistas-box span { font-size: 0.7rem; font-weight: 800; opacity: 0.5; letter-spacing: 2px; }
        .vistas-box img { 
            height: 20px; 
            filter: grayscale(1) invert(1) brightness(3); 
            mix-blend-mode: screen; 
        }

        /* --- PLAYER --- */
        .player {
            background: rgba(0,0,0,0.2); border-radius: 50px; padding: 35px;
            margin: 25px 0; border: 1px solid var(--border);
        }
        .play-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--text); color: var(--bg); border: none; cursor: pointer;
            font-size: 1.6rem; transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.15); box-shadow: 0 0 30px var(--accent); }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--text); color: var(--bg); padding: 22px;
            border-radius: 40px; text-decoration: none; font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="theme-switch" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></div>

    <div id="splash" onclick="entry()">
        <h1>ANDREY</h1>
        <p style="opacity: 0.5; margin-top: 20px; letter-spacing: 5px;">TAP TO ENTER</p>
    </div>

    <div class="nebula"></div>
    <canvas class="stars" id="starCanvas"></canvas>

    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div class="vistas-box">
                <span>VISTAS</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=moebooru">
            </div>

            <div class="player">
                <p style="color: var(--accent); font-size: 0.8rem; margin-bottom: 20px; font-weight: 800; letter-spacing: 2px;">COLDPLAY - YELLOW</p>
                <button class="play-btn" id="pBtn"><i class="fa-solid fa-play" id="icon"></i></button>
            </div>

            <a href="https://github.com/andrey828" target="_blank" class="btn">GITHUB PROFILE</a>
            
            <p style="font-size: 0.5rem; opacity: 0.2; margin-top: 40px; letter-spacing: 4px;">SYSTEM V.4.7</p>
        </div>
    </div>

    <audio id="audio" loop src="https://files.catbox.moe/0v2z88.mp3"></audio>

    <script>
        const a = document.getElementById('audio');
        const icon = document.getElementById('icon');

        function entry() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                document.getElementById('content').style.transform = 'translateY(0) scale(1)';
                a.play(); icon.className = 'fa-solid fa-pause';
            }, 700);
        }

        document.getElementById('pBtn').onclick = () => {
            if (a.paused) { a.play(); icon.className = 'fa-solid fa-pause'; }
            else { a.pause(); icon.className = 'fa-solid fa-play'; }
        }

        function toggleTheme() {
            const h = document.documentElement;
            const isD = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isD ? 'light' : 'dark');
            document.querySelector('.theme-switch i').className = isD ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        // Sistema de estrellas flotantes
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) {
                stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
            }
        }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= 0.2; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();
    </script>
</body>
</html>
