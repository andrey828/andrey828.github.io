<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xA Addon — Combat Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #020205;
            --cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --discord: #5865F2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--ink);
            color: white;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- EFECTOS DE FONDO --- */
        .noise { position: fixed; inset: 0; z-index: -2; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E"); }
        .grid-bg { position: fixed; inset: 0; z-index: -2; pointer-events: none; background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px); background-size: 50px 50px; }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.25; animation: drift 20s infinite alternate; }
        .orb1 { width: 400px; height: 400px; background: var(--cyan); top: -100px; right: -50px; }
        .orb2 { width: 350px; height: 350px; background: var(--discord); bottom: -50px; left: -50px; animation-delay: -5s; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 40px); } }

        /* --- NAVEGACIÓN --- */
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 3px; cursor: pointer; }
        .logo span { color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
        .nav-links a { text-decoration: none; color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono'; font-size: 0.75rem; margin-left: 20px; transition: 0.3s; }
        .nav-links a:hover { color: var(--cyan); }
        .nav-links a.discord-btn { color: var(--discord); font-weight: bold; }

        /* --- HERO --- */
        #hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero-badge { background: rgba(0,229,255,0.1); border: 1px solid var(--cyan); padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-family: 'JetBrains Mono'; color: var(--cyan); margin-bottom: 20px; }
        h1 { font-family: 'Bebas Neue'; font-size: clamp(5rem, 15vw, 10rem); line-height: 0.8; color: var(--cyan); text-shadow: 0 0 40px var(--cyan-glow); }
        h1 span { display: block; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2); }
        .hero-sub { margin: 30px 0; max-width: 500px; color: rgba(255,255,255,0.6); font-size: 1.1rem; }

        /* --- BOTONES --- */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn-main { background: var(--cyan); color: var(--ink); border: none; padding: 15px 35px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'JetBrains Mono'; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--cyan-glow); }
        .btn-discord { background: rgba(88, 101, 242, 0.1); border: 1px solid var(--discord); color: white; padding: 15px 35px; border-radius: 5px; text-decoration: none; transition: 0.3s; font-family: 'JetBrains Mono'; }
        .btn-discord:hover { background: var(--discord); box-shadow: 0 0 30px rgba(88, 101, 242, 0.4); }

        /* --- MÓDULOS (GLASS) --- */
        .sec-title { font-family: 'Bebas Neue'; font-size: 3rem; text-align: center; margin-bottom: 50px; letter-spacing: 5px; }
        .mod-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 0 5% 100px; }
        .mod-card {
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 15px; padding: 30px;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .mod-card:hover { border-color: var(--cyan); transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        .mod-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); transform: translateX(-100%); transition: 0.5s; }
        .mod-card:hover::before { transform: translateX(100%); }
        .mod-card h3 { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--cyan); margin-bottom: 10px; }
        .mod-card p { font-size: 0.9rem; color: rgba(255,255,255,0.5); }

        /* --- FOOTER --- */
        footer { padding: 50px; border-top: 1px solid var(--glass-border); text-align: center; font-family: 'JetBrains Mono'; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="grid-bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <nav>
        <div class="logo"><span>x</span>A_SYSTEM</div>
        <div class="nav-links">
            <a href="#hero">INICIO</a>
            <a href="#modulos">MÓDULOS</a>
            <a href="https://discord.gg/TU_INVITACION" class="discord-btn" target="_blank">DISCORD</a>
        </div>
    </nav>

    <main id="hero">
        <div class="hero-badge">PROTOCOLO ASCENSIÓN v2.0</div>
        <h1>xA<span>ADDON</span></h1>
        <p class="hero-sub">Inyecta potencia bruta a tu cliente. Módulos de combate optimizados con bypass de última generación.</p>
        <div class="btn-group">
            <button class="btn-main" onclick="location.href='#modulos'">VER ARSENAL</button>
            <a href="https://discord.gg/TU_INVITACION" class="btn-discord" target="_blank">UNIRSE AL DISCORD</a>
        </div>
    </main>

    <section id="modulos">
        <h2 class="sec-title">SISTEMAS_ACTIVOS</h2>
        <div class="mod-grid" id="grid">
            </div>
    </section>

    <footer>
        <p>© 2026 xA_DEVELOPMENT // NÚCLEO DE COMBATE ASEGURADO</p>
    </footer>

    <script>
        const modules = [
            { title: "KINETIC_AURA", desc: "Aura de combate con rotación predictiva y bypass para servidores con alta latencia." },
            { title: "AUTO_TOTEM", desc: "Gestión inteligente de inventario para asegurar el uso de totems en menos de 0.1ms." },
            { title: "VOID_FLY", desc: "Sistema de vuelo basado en exploits de paquetes de posición para bypass de Vanilla." },
            { title: "VELOCITY_X", desc: "Anulación selectiva de retroceso (Knockback) para combate estático perfecto." },
            { title: "CRYSTAL_SYNC", desc: "Sincronización de ataques con cristales de fin para daño masivo por segundo." },
            { title: "PACKET_REACH", desc: "Extensión técnica del rango de ataque mediante manipulación de paquetes críticos." }
        ];

        const container = document.getElementById('grid');
        modules.forEach(m => {
            container.innerHTML += `
                <div class="mod-card">
                    <div style="font-family:'JetBrains Mono'; font-size:0.6rem; color:rgba(0,229,255,0.5); margin-bottom:5px;">[ ESTADO: ACTIVO ]</div>
                    <h3>${m.title}</h3>
                    <p>${m.desc}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
