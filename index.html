<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey | Coldplay Experience</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');

        /* --- SYSTEM VARIABLES (COLOR PALETTES) ---
           Configuración de los dos modos: Eléctrico y Pastel
        */
        :root {
            --bg: #020202;
            --card-bg: rgba(255, 255, 255, 0.015);
            --text: #ffffff;
            --accent: #f1c40f; 
            --accent-2: #a18cd1;
            --border: rgba(255, 255, 255, 0.08);
            --glass: blur(60px);
            --shadow: rgba(0,0,0,0.8);
            --p-color: rgba(241, 196, 15, 0.4);
        }

        [data-theme="light"] {
            --bg: #fff0f5;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text: #5d507a;
            --accent: #ff9a9e; 
            --accent-2: #a1c4fd;
            --border: rgba(255, 154, 158, 0.2);
            --glass: blur(30px);
            --shadow: rgba(255, 154, 158, 0.15);
            --p-color: rgba(255, 154, 158, 0.4);
        }

        /* --- BASE RESET ---
        */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            transition: background 0.6s cubic-bezier(0.23, 1, 0.32, 1), 
                        color 0.6s cubic-bezier(0.23, 1, 0.32, 1), 
                        transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }

        /* --- ADVANCED BACKGROUNDS ---
        */
        #bg-canvas { 
            position: fixed; 
            inset: 0; 
            z-index: -2; 
            pointer-events: none; 
        }
        
        .aurora {
            position: fixed; 
            inset: -50%; 
            z-index: -1;
            background: radial-gradient(circle at 30% 30%, var(--accent-2) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, var(--accent) 0%, transparent 40%);
            opacity: 0.2; 
            filter: blur(120px);
            animation: aurora-spin 20s infinite linear;
        }

        @keyframes aurora-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- THEME TOGGLE UI ---
        */
        .theme-switch {
            position: fixed; 
            top: 40px; 
            right: 40px; 
            z-index: 1000;
            background: var(--card-bg); 
            border: 1px solid var(--border);
            width: 60px;
            height: 60px;
            border-radius: 50%; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            box-shadow: 0 10px 40px var(--shadow);
            color: var(--text);
            font-size: 1.2rem;
        }

        .theme-switch:hover {
            transform: scale(1.1) rotate(15deg);
            border-color: var(--accent);
        }

        /* --- SPLASH SCREEN ---
        */
        #splash {
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 9999;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }

        #splash h1 {
            font-family: 'Permanent Marker', cursive; 
            font-size: clamp(3rem, 15vw, 6rem);
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--accent));
            animation: splash-float 3s infinite ease-in-out;
        }

        @keyframes splash-float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 1; }
        }

        /* --- MAIN CARD ARCHITECTURE ---
        */
        #content { 
            opacity: 0; 
            transform: translateY(60px) scale(0.9); 
            width: 90%; 
            max-width: 460px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg); 
            backdrop-filter: var(--glass); 
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border); 
            border-radius: 85px; /* ULTRA ROUNDED */
            padding: 70px 45px; 
            text-align: center;
            box-shadow: 0 60px 120px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .name { 
            font-family: 'Permanent Marker', cursive; 
            font-size: clamp(2.5rem, 10vw, 3.8rem); 
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        /* --- VISITOR COUNTER REDESIGN ---
        */
        .counter-container {
            display: inline-flex; 
            align-items: center; 
            gap: 15px;
            background: rgba(0,0,0,0.3); 
            padding: 12px 30px;
            border-radius: 100px; 
            border: 1px solid var(--border);
            margin-bottom: 40px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        [data-theme="light"] .counter-container {
            background: rgba(255,255,255,0.8);
        }

        .counter-container span { 
            font-size: 0.6rem; 
            letter-spacing: 4px; 
            font-weight: 800; 
            opacity: 0.5;
            text-transform: uppercase;
        }

        .counter-container img { 
            height: 24px; 
            filter: grayscale(1) invert(1) brightness(2.5) contrast(1.2); 
        }

        [data-theme="light"] .counter-container img {
            filter: grayscale(1) contrast(2) brightness(0.2);
        }

        /* --- PLAYER INTERFACE ---
        */
        .player-module {
            background: rgba(0,0,0,0.15); 
            border-radius: 55px; 
            padding: 40px;
            margin: 35px 0; 
            border: 1px solid var(--border);
            position: relative;
        }

        .track-display { 
            font-size: 0.85rem; 
            font-weight: 800; 
            color: var(--accent); 
            margin-bottom: 25px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }

        .btn-circle {
            width: 85px; 
            height: 85px; 
            border-radius: 50%;
            background: var(--text); 
            color: var(--bg); 
            border: none; 
            cursor: pointer;
            font-size: 1.8rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-circle:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 25px 50px var(--accent);
        }

        /* --- INFORMATION BLOCKS ---
        */
        .info-block {
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 45px;
            margin-bottom: 20px; 
            text-align: left; 
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .info-block:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .info-block h4 { 
            color: var(--accent); 
            margin-bottom: 12px; 
            font-size: 1.1rem; 
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-block p { 
            font-size: 0.95rem; 
            opacity: 0.7; 
            line-height: 1.7; 
        }

        /* --- FOOTER LINKS ---
        */
        .action-link {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            background: var(--text); 
            color: var(--bg); 
            padding: 24px;
            border-radius: 45px; 
            text-decoration: none; 
            font-weight: 800;
            font-size: 1rem; 
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .action-link:hover {
            letter-spacing: 2px;
            background: var(--accent);
            color: #000;
        }

        /* --- SCROLLBAR HIDDEN ---
        */
        ::-webkit-scrollbar { display: none; }

    </style>
</head>
<body>

    <div class="theme-switch" id="themeBtn" title="Cambiar Modo">
        <i class="fa-solid fa-moon"></i>
    </div>

    <div id="splash">
        <h1>ANDREY</h1>
        <p style="letter-spacing: 10px; opacity: 0.5; font-size: 0.8rem; margin-top: 20px;">TOUCH TO ENTER</p>
    </div>

    <div class="aurora"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div class="counter-container">
                <span>VISTAS</span>
                <img src="https://count.getloli.com/get/@andrey828?theme=rule73" alt="Stat Counter">
            </div>

            <div class="player-module">
                <div class="track-display" id="track-name">Coldplay - Yellow</div>
                <div class="controls-row">
                    <button class="btn-circle" id="playBtn">
                        <i class="fa-solid fa-play" id="playIcon"></i>
                    </button>
                </div>
            </div>

            <div class="info-block">
                <h4><i class="fa-solid fa-code-branch"></i> xA Addon</h4>
                <p>Especialista en desarrollo de sistemas modulares y optimización de flujos digitales de alta demanda.</p>
            </div>

            <a href="https://github.com/andrey828" target="_blank" class="action-link">
                <i class="fa-brands fa-github"></i> REPOSITORIO GITHUB
            </a>
            
            <p style="font-size: 0.6rem; opacity: 0.2; margin-top: 30px; letter-spacing: 2px;">© 2026 DIGITAL DESIGN SYSTEM</p>
        </div>
    </div>

    <script>
        // AUDIO ENGINE CONFIGURATION
        const AUDIO_URL = "https://files.catbox.moe/0v2z88.mp3"; // Yellow - Coldplay
        const audio = new Audio(AUDIO_URL);
        audio.loop = true;
        audio.volume = 0.7;

        // DOM ELEMENTS
        const splash = document.getElementById('splash');
        const content = document.getElementById('content');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const themeBtn = document.getElementById('themeBtn');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // STATE MANAGEMENT
        let isPlaying = false;
        let particles = [];
        let mouse = { x: null, y: null };

        // THEME ENGINE
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.querySelector('i').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        themeBtn.addEventListener('click', toggleTheme);

        // PARTICLE SYSTEM LOGIC
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1 - 0.2;
                this.life = Math.random() * 1;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.y < 0) this.reset();
                
                // Mouse interaction
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance < 100) {
                        this.x -= dx / 20;
                        this.y -= dy / 20;
                    }
                }
            }

            draw() {
                const color = getComputedStyle(document.documentElement).getPropertyValue('--p-color');
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 120; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // AUDIO CONTROLS
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.className = 'fa-solid fa-pause';
                isPlaying = true;
            } else {
                audio.pause();
                playIcon.className = 'fa-solid fa-play';
                isPlaying = false;
            }
        }

        playBtn.addEventListener('click', togglePlay);

        // ENTRY LOGIC
        function startExperience() {
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            
            setTimeout(() => {
                content.style.opacity = '1';
                content.style.transform = 'translateY(0) scale(1)';
                
                // Auto-start audio if possible
                audio.play().then(() => {
                    playIcon.className = 'fa-solid fa-pause';
                    isPlaying = true;
                }).catch(err => console.log("User interaction required for audio"));
            }, 500);
        }

        splash.addEventListener('click', startExperience);

        // WINDOW EVENTS
        window.addEventListener('resize', initParticles);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        // INITIALIZE SYSTEM
        initParticles();
        animate();

        // CONSOLE EASTER EGG
        console.log("%c ANDREY MIHAI SYSTEM LOADED ", "background: #f1c40f; color: #000; font-weight: bold;");
        
    </script>
</body>
</html>
