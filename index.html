<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrey Mihai | Personal Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0e17;
            color: #fff;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #nebula-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
            padding: 50px;
            animation: fadeInUp 1.5s ease-out;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
        }

        .header-section { text-align: center; margin-bottom: 40px; }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2.5rem, 8vw, 4rem);
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(255,154,158,0.3));
        }

        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8);
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            margin: 35px 0 15px 0;
            font-weight: 600;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            transition: 0.4s ease;
        }

        .info-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
        }

        .social-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.07);
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .social-link:hover {
            background: #fff;
            color: #0a0e17;
            transform: translateY(-5px);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="nebula-canvas"></canvas>

    <div class="glass-card" id="card">
        <div class="header-section">
            <h1>Andrey Mihai</h1>
            <span class="tag">Digital Creator</span>
        </div>

        <p class="section-title">Proyecto</p>
        <div class="info-box">
            <h3 style="color: #ff9a9e; margin-bottom: 8px;">xA Addon</h3>
            <p style="font-size: 0.95rem; color: rgba(255, 255, 255, 0.7); line-height: 1.6;">
                Enfocado en el desarrollo y mejora continua de <strong>xA Addon</strong>. Creando experiencias optimizadas y funcionales.
            </p>
        </div>

        <p class="section-title">Comunidad & Social</p>
        <div class="social-container">
            <a href="https://github.com/andrey828" target="_blank" class="social-link">GitHub</a>
            <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="social-link">Discord</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Andrey Mihai
    </footer>

    <script>
        const canvas = document.getElementById('nebula-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = Array.from({length: 100}, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                size: Math.random() * 2,
                alpha: Math.random()
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha * 0.3})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 25;
            let y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.onresize = init;
        init(); draw();
    </script>
</body>
</html>
