<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xA_Addon | Elite Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020205;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --border: rgba(0, 229, 255, 0.15);
            --card-bg: rgba(255, 255, 255, 0.02);
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body {
            background: var(--bg); color: white;
            font-family: var(--font-main); overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- EFECTOS ATMÓSFERA --- */
        .scanline { position: fixed; top: 0; width: 100%; height: 2px; background: var(--accent-glow); z-index: 1000; pointer-events: none; animation: scan 3s linear infinite; opacity: 0.5; }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }
        
        #canvas-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }

        /* --- NAVEGACIÓN --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 6%; background: rgba(2, 2, 5, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { 
            text-decoration: none; color: rgba(255,255,255,0.4); font-family: var(--font-mono); 
            font-size: 0.75rem; transition: 0.3s; padding: 8px 15px; border-radius: 4px;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); background: rgba(0, 229, 255, 0.05); }

        /* --- HERO SECTION --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero-badge { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 5px 15px; margin-bottom: 20px; letter-spacing: 3px; }
        
        h1 { font-family: 'Bebas Neue'; font-size: clamp(4.5rem, 18vw, 10rem); line-height: 0.9; }
        h1 span { display: block; -webkit-text-stroke: 1px var(--accent); color: transparent; opacity: 0.5; }
        
        .hero-desc { max-width: 550px; margin: 30px 0; color: rgba(255,255,255,0.5); font-size: 1rem; line-height: 1.6; }

        .btn-main {
            background: var(--accent); color: #000; text-decoration: none;
            padding: 18px 40px; font-family: 'Bebas Neue'; font-size: 1.5rem;
            letter-spacing: 2px; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent-glow); filter: brightness(1.2); }

        /* --- MÓDULOS --- */
        .section-title { font-family: 'Bebas Neue'; font-size: 3rem; text-align: center; padding: 100px 0 40px; letter-spacing: 5px; color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 0 7% 100px; }
        
        .mod-card {
            background: var(--card-bg); border: 1px solid var(--border); padding: 35px;
            position: relative; transition: 0.4s; overflow: hidden;
        }
        .mod-card:hover { background: rgba(0, 229, 255, 0.04); border-color: var(--accent); transform: translateY(-5px); }
        .mod-card::after { content: ""; position: absolute; top: 0; right: 0; width: 30px; height: 30px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        .mod-card i { font-size: 1.8rem; color: var(--accent); margin-bottom: 20px; }
        .mod-card h3 { font-family: 'Bebas Neue'; font-size: 1.6rem; letter-spacing: 1px; margin-bottom: 12px; }
        .mod-card p { font-size: 0.85rem; color: rgba(255,255,255,0.4); line-height: 1.5; }
        .mod-status { font-family: var(--font-mono); font-size: 0.6rem; color: #00ff6a; margin-top: 20px; display: block; letter-spacing: 1px; }

        /* --- CONTADOR VISITAS --- */
        .monitor {
            position: fixed; bottom: 30px; left: 30px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--border);
            padding: 10px 20px; display: flex; align-items: center; gap: 15px;
            font-family: var(--font-mono); font-size: 0.7rem; z-index: 100;
        }
        .monitor .pulse { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        footer { padding: 50px; text-align: center; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.65rem; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <canvas id="canvas-bg"></canvas>

    <nav>
        <div class="logo">xA Development</div>
        <div class="nav-links">
            <a href="#" class="active">// INICIO</a>
            <a href="#arsenal">// Modulos </a>
            <a href="https://discord.gg/8ezp4sthqG" target="_blank" style="color:#5865F2;">// DISCORD</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-badge">PROTOCOLO_BYPASS_V3.0_ACTIVO</div>
        <h1>xA_ADDON <span>SYSTEM</span></h1>
        <p class="hero-desc">Addon for meteor client</p>
        <a href="#arsenal" class="btn-main">SISTEMAS DE ARSENAL</a>
    </section>

    <h2 class="section-title" id="arsenal">MÓDULOS_ACTIVOS</h2>
    
    <div class="grid" id="module-container">
        </div>

    <div class="monitor">
        <div class="pulse"></div>
        <span>TRAFFIC_DATA:</span>
        <span id="visit-num" style="color: var(--accent);">--</span>
    </div>

    <footer>
        <p>© 2026 xA_DEVELOPMENT // NÚCLEO_CARGADO // BY MIHAI</p>
    </footer>

    <script>
        const mods = [
            { icon: "fa-shield-halved", title: "xArmor", desc: "Defensa inteligente en tiempo real. Sistema Anti-Break automático que protege tu Netherite antes de la ruptura." },
            { icon: "fa-hammer", title: "xMace", desc: "Exploit de maza. Manipulación de paquetes para simular caídas de 100 bloques y matar de un golpe desde el suelo." },
            { icon: "fa-gem", title: "xTotem", desc: "Inmortalidad automatizada. Reposición instantánea de tótems optimizada para evitar fallos incluso con lag." },
            { icon: "fa-ban", title: "xNoPoP", desc: "Gestión de vida. Evita el gasto innecesario de tótems por daño de caida. Cada recurso cuenta en el campo de batalla." },
            { icon: "fa-crosshairs", title: "xAura", desc: "KillAura predictivo. Golpes críticos constantes y alcance máximo ignorando obstáculos con precisión quirúrgica." },
            { icon: "fa-arrows-rotate", title: "xSwap", desc: "Movilidad táctica. Cambia entre Elytra y armadura pesada al instante para escapes o tanquear daño." },
            { icon: "fa-clock-rotate-left", title: "xBackStep", desc: "Botón de pánico. Teletransporte instantáneo al punto de origen para confundir o escapar de combos." },
            { icon: "fa-comment-slash", title: "xAutoEzz", desc: "Victoria con estilo. Envía mensajes de humillación personalizados al chat automáticamente al eliminar oponentes." }
        ];

        const container = document.getElementById('module-container');
        mods.forEach(m => {
            container.innerHTML += `
                <div class="mod-card">
                    <i class="fa-solid ${m.icon}"></i>
                    <h3>${m.title}</h3>
                    <p>${m.desc}</p>
                    <span class="mod-status">[ STATUS: ONLINE ]</span>
                </div>
            `;
        });

        // Simulación de contador táctico
        let count = 2450;
        setInterval(() => {
            count += Math.floor(Math.random() * 3);
            document.getElementById('visit-num').innerText = count;
        }, 3000);
        document.getElementById('visit-num').innerText = count;

        // Partículas del fondo
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00e5ff";
            particles.forEach(p => {
                p.y -= 0.5; if(p.y < 0) p.y = canvas.height;
                ctx.fillRect(p.x, p.y, p.s, p.s);
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
    </script>
</body>
</html>
