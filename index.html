<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JAVAVERSE | MULTI-KERNEL OS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="desktop">
        <div class="bg-stats">
            <div class="stat">CPU: <span id="cpu-load">0%</span></div>
            <div class="stat">MEM: 1.5GB / 32GB</div>
        </div>

        <div class="launcher" id="launcherBtn">
            <div class="orbit"></div>
            <button class="main-trigger">
                <i class="fas fa-power-off"></i>
                <span>OPEN MULTI-CORE GUI</span>
            </button>
        </div>

        <div id="guiWrapper" class="gui-overlay hidden">
            <div class="gui-header">
                <div class="title">POLYGLOT COMMAND CENTER</div>
                <button class="close-gui" onclick="toggleGUI()">✕</button>
            </div>
            
            <div class="terminal-grid">
                <div class="term-window java-border">
                    <div class="t-head"><span>JAVA_RUNTIME</span><i class="fab fa-java"></i></div>
                    <div class="t-body" id="out-java"># system.ready();</div>
                </div>

                <div class="term-window cpp-border">
                    <div class="t-head"><span>CPP_NATIVE</span><i class="fas fa-microchip"></i></div>
                    <div class="t-body" id="out-cpp"># std::init();</div>
                </div>

                <div class="term-window py-border">
                    <div class="t-head"><span>PY_AI_MODEL</span><i class="fab fa-python"></i></div>
                    <div class="t-body" id="out-py"># import neural_core</div>
                </div>

                <div class="term-window cs-border">
                    <div class="t-head"><span>CS_DOTNET</span><i class="fas fa-code-branch"></i></div>
                    <div class="t-body" id="out-cs"># dotnet.run();</div>
                </div>
            </div>

            <div class="gui-footer">
                <button id="syncAllBtn" class="sync-btn">SYNC ALL CORES</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
