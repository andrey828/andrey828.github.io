<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrey | Premium Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;600;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            /* MODO OSCURO */
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --accent: #a18cd1; /* Púrpura Eléctrico */
            --accent-2: #ff9a9e; /* Rosa Neón */
            --border: rgba(255, 255, 255, 0.1);
            --counter-bg: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            /* MODO CLARO - COLORES PASTELES */
            --bg: #fffafa;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text: #7d6b91;
            --accent: #fbc2eb; /* Rosa Pastel */
            --accent-2: #a1c4fd; /* Azul Pastel */
            --border: rgba(161, 196, 253, 0.3);
            --counter-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- TEMA SWITCHER --- */
        .theme-switch {
            position: fixed; top: 25px; right: 25px; z-index: 10000;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 50%; cursor: pointer;
            backdrop-filter: blur(15px); color: var(--text);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- SPLASH INICIAL --- */
        #splash {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #splash h1 {
            font-family: 'Permanent Marker', cursive; font-size: 4rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite alternate;
        }

        /* --- DISEÑO DEL NUEVO CONTADOR (REDESIGN) --- */
        .view-counter-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            perspective: 1000px;
        }

        .counter-pill {
            background: var(--counter-bg);
            border: 1px solid var(--border);
            padding: 10px 25px;
            border-radius: 100px; /* Redondeado máximo */
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 0 15px var(--border);
            backdrop-filter: blur(10px);
        }

        .counter-pill i {
            color: var(--accent);
            font-size: 0.9rem;
            animation: float-icon 3s infinite ease-in-out;
        }

        .counter-pill .stats-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stats-text .label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            font-weight: 800;
        }

        /* Hack para integrar el contador de API con estilo limpio */
        .api-numbers {
            height: 22px;
            overflow: hidden;
            display: flex;
            align-items: center;
            filter: grayscale(1) brightness(1.5) drop-shadow(0 0 5px var(--accent));
        }

        [data-theme="light"] .api-numbers {
            filter: grayscale(1) contrast(2) brightness(0.5);
        }

        /* --- TARJETA PRINCIPAL --- */
        #content { opacity: 0; transform: scale(0.95) translateY(20px); width: 92%; max-width: 440px; }
        
        .card {
            background: var(--card-bg); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); 
            border-radius: 70px; /* Súper redondeado */
            padding: 55px 35px; text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            position: relative;
        }

        .name { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 3.2rem; 
            margin-bottom: 25px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- REPRODUCTOR --- */
        .player {
            background: rgba(0,0,0,0.08); 
            border-radius: 50px; 
            padding: 30px;
            margin: 30px 0; 
            border: 1px solid var(--border);
        }
        .track-info { 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--accent); 
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .play-btn {
            width: 75px; height: 75px; border-radius: 50%; 
            background: var(--text); color: var(--bg);
            border: none; cursor: pointer; font-size: 1.5rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .play-btn:hover { transform: scale(1.1) rotate(5deg); }

        /* --- BOTONES Y SECCIONES --- */
        .box {
            background: var(--card-bg); padding: 25px; border-radius: 40px;
            margin-bottom: 20px; text-align: left; border: 1px solid var(--border);
        }
        .box h4 { color: var(--accent); margin-bottom: 8px; font-weight: 800; }
        .box p { font-size: 0.85rem; opacity: 0.7; line-height: 1.5; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            background: var(--card-bg); padding: 20px; border-radius: 35px;
            text-decoration: none; color: var(--text); font-weight: 800; 
            border: 1px solid var(--border); font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: var(--text); color: var(--bg); transform: translateY(-5px); }

        @keyframes pulse { from { opacity: 0.5; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }
        @keyframes float-icon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    </style>
 head>
<body>

    <div class="theme-switch" onclick="toggleTheme()">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
    </div>

    <div id="splash" onclick="entry()">
        <h1>ANDREY</h1>
        <p style="letter-spacing: 5px; opacity: 0.4; font-size: 0.7rem;">TAP TO UNLOCK VIBE</p>
    </div>

    <div id="content">
        <div class="card">
            <h1 class="name">Andrey Mihai</h1>
            
            <div class="view-counter-container">
                <div class="counter-pill">
                    <i class="fa-solid fa-chart-line"></i>
                    <div class="stats-text">
                        <span class="label">User Traffic</span>
                        <div class="api-numbers">
                            <img src="https://count.getloli.com/get/@andrey828?theme=rule73" style="height: 25px;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="player">
                <div class="track-info" id="track-name">Yellow - Coldplay (Instrumental)</div>
                <button class="play-btn" id="pBtn"><i class="fa-solid fa-play" id="icon"></i></button>
            </div>

            <div class="box">
                <h4><i class="fa-solid fa-ghost"></i> xA Addon</h4>
                <p>Minimalismo y optimización extrema aplicados al desarrollo moderno.</p>
            </div>

            <div class="btn-group">
                <a href="https://github.com/andrey828" target="_blank" class="btn"><i class="fa-brands fa-github"></i> GITHUB</a>
                <a href="https://discord.gg/8ezp4sthqG" target="_blank" class="btn"><i class="fa-brands fa-discord"></i> DISCORD</a>
            </div>
        </div>
    </div>

    <script>
        // Audio Instrumental de Yellow (Reemplazado por link directo estable)
        const audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3");
        audio.loop = true;

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function entry() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                document.getElementById('content').style.transform = 'scale(1) translateY(0)';
                
                // Play automático tras interacción
                audio.play().then(() => {
                    document.getElementById('icon').classList.replace('fa-play', 'fa-pause');
                });
            }, 800);
        }

        document.getElementById('pBtn').onclick = () => {
            if (audio.paused) {
                audio.play();
                document.getElementById('icon').classList.replace('fa-play', 'fa-pause');
            } else {
                audio.pause();
                document.getElementById('icon').classList.replace('fa-pause', 'fa-play');
            }
        };
    </script>
</body>
</html>
